<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Updating Prem Oracle</title>
  <style>
    :root {
      color-scheme: light;
      --green: #38003c;
      --cream: #f5f7fb;
      --ink: #17202a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--cream);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      text-align: center;
    }
    main {
      max-width: 320px;
    }
    .mark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      background: var(--green);
      color: white;
      font: 800 32px ui-sans-serif, system-ui, sans-serif;
    }
    h1 {
      margin: 0 0 10px;
      font: 800 28px ui-sans-serif, system-ui, sans-serif;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      line-height: 1.45;
      color: #4c554e;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">PO</div>
    <h1>Updating app</h1>
    <p>Clearing the old Home Screen cache. Your profile and picks stay on this phone.</p>
  </main>
  <script>
    (async () => {
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } finally {
        location.replace("./?refresh=20260709a");
      }
    })();
  </script>
</body>
</html>
